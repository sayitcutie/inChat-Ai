<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Inbox</title>

<style>
body{
background:#0f0f0f;
color:white;
font-family:Arial;
margin:0;
}

.header{
padding:15px;
border-bottom:1px solid #222;
font-size:20px;
}

.chat{
display:flex;
justify-content:space-between;
padding:15px;
border-bottom:1px solid #222;
cursor:pointer;
}

.chat:hover{
background:#1a1a1a;
}

.name{
font-weight:bold;
}

.last{
color:#aaa;
font-size:14px;
}
</style>

</head>

<body>

<div class="header">Chats</div>

<div id="chatList"></div>

<script type="module">

import { createClient } from
'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabase = createClient(
"https://vlhdzukibuscqoofjlpc.supabase.co",
"sb_publishable_pXaa1Z0i1C2pcfkgOGUZGA_P4tw758p"
)

async function loadChats(){

const {data:session}=await supabase.auth.getUser()

const userId=session.user.id

const {data:rooms}=await supabase
.from("participants")
.select("room_id")
.eq("user_id",userId)

const roomIds=rooms.map(r=>r.room_id)

const {data:messages}=await supabase
.from("messages")
.select("*")
.in("room_id",roomIds)
.order("created_at",{ascending:false})

const chatList=document.getElementById("chatList")

messages.forEach(msg=>{

let div=document.createElement("div")
div.className="chat"

div.innerHTML=`
<div>
<div class="name">${msg.sender_id}</div>
<div class="last">${msg.message}</div>
</div>
<div>${new Date(msg.created_at).toLocaleTimeString()}</div>
`

div.onclick=()=>{
window.location.href="chat.html?room="+msg.room_id
}

chatList.appendChild(div)

})

}

loadChats()

</script>

</body>
</html>
